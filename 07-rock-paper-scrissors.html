<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock-Paper-Scissors</title>
</head>

<body>

    <p>Rock Paper Scissors</p>
    <button onclick="playGame('rock')">Rock</button>
    <button onclick="playGame('paper')">Paper</button>
    <button onclick="playGame('scrissors')">Scrissors</button>


    <script>

        function pickComputerMove() {
            const computerMove = Math.random()
            if (computerMove >= 0 && computerMove < 1 / 3)
                return 'rock'
            else if (computerMove >= 1 / 3 && computerMove < 2 / 3)
                return 'paper'
            else if (computerMove >= 2 / 3 && computerMove < 1)
                return 'scrissors'
        }



        function playGame(playerMove) {
            const computerMove = pickComputerMove()
            let result = ''
            if (playerMove === 'scrissors') {
                if (computerMove === 'scrissors')
                    result = 'Tie!'
                else if (computerMove === 'rock')
                    result = 'You lose!'
                else if (computerMove === 'paper')
                    result = 'You win!'
            }
            else if (playerMove === 'paper') {
                if (computerMove === 'paper')
                    result = 'Tie'
                else if (computerMove === 'rock')
                    result = 'You lose!'
                else if (computerMove === 'scrissors')
                    result = 'You win!'
            }
            else if (playerMove === 'rock') {
                if (computerMove === 'rock')
                    result = 'Tie'
                else if (computerMove === 'paper')
                    result = 'You lose!'
                else if (computerMove === 'scrissors')
                    result = 'You win!'
            }

            alert(`You are ${playerMove}. Computer is ${computerMove}. ${result}`)


        }


    </script>

</body>

</html>
